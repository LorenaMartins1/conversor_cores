<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Cores</title>
    <style>
        :root {
            --bg-color: #e9ecef;
            --card-bg: rgba(255, 255, 255, 0.7);
            --accent-color: #4a90e2;
            --text-main: #2d3436;
            --text-secondary: #636e72;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #ffffff, #e9ecef);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        /* Preview de Cor Principal */
        .color-preview-container {
            position: relative;
            margin-bottom: 30px;
        }

        .main-box {
            width: 220px;
            height: 220px;
            border-radius: 30px;
            background: white;
            box-shadow: 20px 20px 60px #c7cacd, -20px -20px 60px #ffffff;
            transition: 0.3s ease;
            border: 8px solid white;
        }

        /* Painel Central de Controle */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            width: 100%;
            max-width: 400px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 60px;
            height: 60px;
            cursor: pointer;
            background: none;
            margin-bottom: 20px;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .input-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .rgb-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .readonly-field {
            width: 60px;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 10px 0;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-color);
            text-align: center;
        }

        /* Grid de Cartões de Formato */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .format-card {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .format-card:hover {
            transform: translateY(-5px);
        }

        .format-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
        }

        .format-value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 15px;
            display: block;
            word-break: break-all;
        }

        .copy-btn {
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        /* Notificação simples */
        #toast {
            position: fixed;
            bottom: 20px;
            background: #333;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>Conversor De Cores</h1>

    <div class="color-preview-container">
        <div class="main-box" id="box"></div>
    </div>

    <div class="glass-panel">
        <input type="color" id="picker" value="#003cff">
        <div class="input-label">Entrada RGB</div>
        <div class="rgb-group">
            <input id="r" class="readonly-field" type="text" readonly title="Red">
            <input id="g" class="readonly-field" type="text" readonly title="Green">
            <input id="b" class="readonly-field" type="text" readonly title="Blue">
        </div>
    </div>

    <div class="results-grid">
        <div class="format-card">
            <h3>RGB</h3>
            <span class="format-value" id="rgbText"></span>
            <button class="copy-btn" onclick="copy('rgbText')">COPIAR</button>
        </div>
        <div class="format-card">
            <h3>HEXADECIMAL</h3>
            <span class="format-value" id="hexText"></span>
            <button class="copy-btn" onclick="copy('hexText')">COPIAR</button>
        </div>
        <div class="format-card">
            <h3>HSL</h3>
            <span class="format-value" id="hslText"></span>
            <button class="copy-btn" onclick="copy('hslText')">COPIAR</button>
        </div>
        <div class="format-card">
            <h3>HSV</h3>
            <span class="format-value" id="hsvText"></span>
            <button class="copy-btn" onclick="copy('hsvText')">COPIAR</button>
        </div>
        <div class="format-card">
            <h3>CMYK</h3>
            <span class="format-value" id="cmykText"></span>
            <button class="copy-btn" onclick="copy('cmykText')">COPIAR</button>
        </div>
    </div>

    <div id="toast">Copiado para a área de transferência!</div>

    <script>
        const box = document.getElementById("box");
        const picker = document.getElementById("picker");
        const rOut = document.getElementById("r");
        const gOut = document.getElementById("g");
        const bOut = document.getElementById("b");
        const toast = document.getElementById("toast");

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
        }

        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let d = max - min;
            let h, s, v = max;
            s = max === 0 ? 0 : d / max;
            if (max === min) h = 0;
            else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(v * 100)];
        }

        function rgbToCmyk(r, g, b) {
            let c = 1 - r / 255, m = 1 - g / 255, y = 1 - b / 255;
            let k = Math.min(c, m, y);
            if (k === 1) return [0, 0, 0, 100];
            return [Math.round((c-k)/(1-k)*100), Math.round((m-k)/(1-k)*100), Math.round((y-k)/(1-k)*100), Math.round(k*100)];
        }

        function update() {
            const hex = picker.value;
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);

            rOut.value = r;
            gOut.value = g;
            bOut.value = b;
            box.style.backgroundColor = hex;

            const hsl = rgbToHsl(r, g, b);
            const hsv = rgbToHsv(r, g, b);
            const cmyk = rgbToCmyk(r, g, b);

            document.getElementById("rgbText").innerText = `rgb(${r}, ${g}, ${b})`;
            document.getElementById("hexText").innerText = hex.toUpperCase();
            document.getElementById("hslText").innerText = `hsl(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%)`;
            document.getElementById("hsvText").innerText = `hsv(${hsv[0]}, ${hsv[1]}%, ${hsv[2]}%)`;
            document.getElementById("cmykText").innerText = `${cmyk[0]}%, ${cmyk[1]}%, ${cmyk[2]}%, ${cmyk[3]}%`;
        }

        picker.addEventListener("input", update);

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                toast.style.opacity = "1";
                setTimeout(() => toast.style.opacity = "0", 2000);
            });
        }

        update();
    </script>
</body>
</html>
