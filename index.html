<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONVERSOR DE CORES</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .box {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px solid white;
        }

        .main-control {
            background: white;
            display: inline-block;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        input[type="color"] {
            width: 80px;
            height: 40px;
            border: none;
            cursor: pointer;
            background: none;
            margin-bottom: 15px;
        }

        .rgb-display {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        /* Estilo para os campos somente leitura */
        .readonly-input {
            width: 50px;
            padding: 8px;
            border: 1px solid #eee;
            border-radius: 6px;
            background: #fdfdfd;
            color: #666;
            text-align: center;
            font-weight: bold;
            outline: none;
            cursor: default;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            width: 160px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
        }

        .value {
            font-weight: bold;
            font-family: monospace;
            margin-bottom: 12px;
            font-size: 14px;
            color: #333;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            font-size: 12px;
            transition: 0.2s;
        }

        button:hover { background: #45a049; }
    </style>
</head>
<body>

    <h1>🎨 Conversor de Cores</h1>

    <div class="box" id="box"></div>

    <div class="main-control">
        <input type="color" id="picker" value="#003cff">
        <div style="font-weight: bold; color: #444;">RGB (Leitura)</div>
        <div class="rgb-display">
            <input id="r" class="readonly-input" type="text" readonly>
            <input id="g" class="readonly-input" type="text" readonly>
            <input id="b" class="readonly-input" type="text" readonly>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>RGB</h3>
            <div class="value" id="rgbText"></div>
            <button onclick="copy('rgbText')">Copiar</button>
        </div>
        <div class="card">
            <h3>HEX</h3>
            <div class="value" id="hexText"></div>
            <button onclick="copy('hexText')">Copiar</button>
        </div>
        <div class="card">
            <h3>HSL</h3>
            <div class="value" id="hslText"></div>
            <button onclick="copy('hslText')">Copiar</button>
        </div>
        <div class="card">
            <h3>HSV</h3>
            <div class="value" id="hsvText"></div>
            <button onclick="copy('hsvText')">Copiar</button>
        </div>
        <div class="card">
            <h3>CMYK</h3>
            <div class="value" id="cmykText"></div>
            <button onclick="copy('cmykText')">Copiar</button>
        </div>
    </div>

    <script>
        const box = document.getElementById("box");
        const picker = document.getElementById("picker");
        const rOut = document.getElementById("r");
        const gOut = document.getElementById("g");
        const bOut = document.getElementById("b");

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
        }

        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let d = max - min;
            let h, s, v = max;
            s = max === 0 ? 0 : d / max;
            if (max === min) h = 0;
            else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(v * 100)];
        }

        function rgbToCmyk(r, g, b) {
            let c = 1 - r / 255, m = 1 - g / 255, y = 1 - b / 255;
            let k = Math.min(c, m, y);
            if (k === 1) return [0, 0, 0, 100];
            return [Math.round((c-k)/(1-k)*100), Math.round((m-k)/(1-k)*100), Math.round((y-k)/(1-k)*100), Math.round(k*100)];
        }

        function update() {
            const hex = picker.value;
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);

            // Atualiza campos de leitura
            rOut.value = r;
            gOut.value = g;
            bOut.value = b;

            // Atualiza visual
            box.style.backgroundColor = hex;

            // Conversões
            const hsl = rgbToHsl(r, g, b);
            const hsv = rgbToHsv(r, g, b);
            const cmyk = rgbToCmyk(r, g, b);

            // Atualiza textos
            document.getElementById("rgbText").innerText = `rgb(${r}, ${g}, ${b})`;
            document.getElementById("hexText").innerText = hex.toUpperCase();
            document.getElementById("hslText").innerText = `hsl(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%)`;
            document.getElementById("hsvText").innerText = `hsv(${hsv[0]}, ${hsv[1]}%, ${hsv[2]}%)`;
            document.getElementById("cmykText").innerText = `cmyk(${cmyk.join(", ")})`;
        }

        picker.addEventListener("input", update);

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => alert("Copiado!"));
        }

        // Início
        update();
    </script>
</body>
</html>
